---
layout: page
title: Blog Page
---
{% for post in site.posts %}
<div class="card-deck">
    <div class="card">
      
      <div class="card-body">
        <h5 class="card-title"><a href="{{ post.url }}">{{ post.title }}</a></h5>
        <p class="card-text">{{page.content}}</p>
        
      </div>
    </div>
  </div>
{% endfor %}

---
layout: page
title: Blog Page
---
{% for post in site.posts %}
<div class="card-deck">
    <div class="card">
      <img class="card-img-top img-fluid" src="https://cdn.pixabay.com/photo/2019/07/19/12/45/connection-4348764_960_720.png" alt="Card image cap">
      <div class="card-body">
        <h5 class="card-title"><a href="{{ post.url }}">{{ post.title }}</a></h5>
        <p class="card-text">{{content}}</p>
        
      </div>
    </div>
  </div>
{% endfor %}
